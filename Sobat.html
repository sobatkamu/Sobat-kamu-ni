<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobat Kamu - Order Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-blue: #0047AB;
            --vibrant-yellow: #FFD700;
            --white: #ffffff;
            --light-gray: #f8f9fa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Lexend', sans-serif; 
            background-color: var(--light-gray); 
            padding-bottom: 100px; /* Ruang untuk bar checkout */
        }

        header { 
            background: var(--royal-blue); 
            color: white; 
            padding: 20px; 
            text-align: center; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .category-title {
            padding: 20px 15px 10px;
            color: var(--royal-blue);
            font-size: 1.2rem;
            border-bottom: 3px solid var(--vibrant-yellow);
            display: inline-block;
            margin-left: 15px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 15px;
        }

        .menu-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .menu-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            background-color: #ddd;
        }

        .card-info { padding: 12px; flex-grow: 1; text-align: center; }

        .menu-name { font-weight: bold; font-size: 1rem; margin-bottom: 5px; }

        .menu-price { color: var(--royal-blue); font-weight: bold; margin-bottom: 10px; }

        .btn-add {
            background-color: var(--vibrant-yellow);
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-add:active { transform: scale(0.95); }

        /* Floating Checkout Bar */
        .checkout-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 15px 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-text { font-size: 0.8rem; color: #777; }
        .total-price { font-size: 1.2rem; font-weight: bold; color: var(--royal-blue); }

        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 370px) {
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>Sobat Kamu</h1>
    <p style="font-size: 0.8rem; opacity: 0.9;">Teman Setia Harimu</p>
</header>

<h2 class="category-title">Makanan</h2>
<div class="menu-grid">
    <div class="menu-card">
        <img src="https://via.placeholder.com/300?text=Nasi+BaBol" alt="Nasi Chiken BaBol">
        <div class="card-info">
            <div class="menu-name">Nasi Chiken BaBol</div>
            <div class="menu-price">Rp 18.000</div>
            <button class="btn-add">Tambah</button>
        </div>
    </div>
    <div class="menu-card">
        <img src="https://via.placeholder.com/300?text=Burger+Kamu" alt="Burger Kamu">
        <div class="card-info">
            <div class="menu-name">Burger Kamu</div>
            <div class="menu-price">Rp 20.000</div>
            <button class="btn-add">Tambah</button>
        </div>
    </div>
    <div class="menu-card">
        <img src="https://via.placeholder.com/300?text=Nasi+Goreng" alt="Nasi Goreng">
        <div class="card-info">
            <div class="menu-name">Nasi Goreng</div>
            <div class="menu-price">Rp 15.000</div>
            <button class="btn-add">Tambah</button>
        </div>
    </div>
</div>

<h2 class="category-title">Minuman</h2>
<div class="menu-grid">
    <div class="menu-card">
        <img src="https://via.placeholder.com/300?text=Mitcha+Sobat" alt="Mitcha Sobat">
        <div class="card-info">
            <div class="menu-name">Mitcha Sobat</div>
            <div class="menu-price">Rp 10.000</div>
            <button class="btn-add">Tambah</button>
        </div>
    </div>
    <div class="menu-card">
        <img src="https://via.placeholder.com/300?text=Es+Jeruk" alt="Es Jeruk">
        <div class="card-info">
            <div class="menu-name">Es Jeruk</div>
            <div class="menu-price">Rp 7.000</div>
            <button class="btn-add">Tambah</button>
        </div>
    </div>
</div>

<div class="checkout-bar">
    <div>
        <div class="total-text">Total Pesanan</div>
        <div class="total-price">Rp 0</div>
    </div>
    <a href="https://wa.me/6281958406093?text=Halo%20Sobat%20Kamu%2C%20saya%20ingin%20pesan%3A" target="_blank" class="btn-whatsapp">
        Pesan Sekarang
    </a>
</div>

</body>
  </html>
