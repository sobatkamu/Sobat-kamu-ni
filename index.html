<div class="container">
    <h2 class="category-title">🍴 Makanan & Snack</h2>
    <div class="menu-grid">
        <div class="menu-card glass-morph">
            <div class="badge-discount">Best Seller</div>
            <img src="burger_komplit.jpg" alt="Burger Sobat Komplit">
            <div class="card-info">
                <div class="menu-name">Burger Sobat Komplit</div>
                <div class="menu-price">Rp 35.000</div>
                
                <div class="stepper">
                    <button class="btn-step" onclick="updateQty('Burger Sobat Komplit', 35000, 'makanan', -1)">−</button>
                    <span class="qty-val" id="qty-Burger-Sobat-Komplit">0</span>
                    <button class="btn-step btn-plus" onclick="updateQty('Burger Sobat Komplit', 35000, 'makanan', 1)">+</button>
                </div>
            </div>
        </div>
        
        </div>

    <h2 class="category-title">🥤 Minuman Blend</h2>
    <div class="menu-grid">
        <div class="menu-card glass-morph">
            <img src="coklat_milk.jpg" alt="Coklat Blend Milk">
            <div class="card-info">
                <div class="menu-name">Coklat Blend Milk</div>
                <div class="menu-price">Rp 12.000</div>
                <div class="stepper">
                    <button class="btn-step" onclick="updateQty('Coklat Blend Milk', 12000, 'minuman', -1)">−</button>
                    <span class="qty-val" id="qty-Coklat-Blend-Milk">0</span>
                    <button class="btn-step btn-plus" onclick="updateQty('Coklat Blend Milk', 12000, 'minuman', 1)">+</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="liquid-checkout" id="checkout-bar">
    <div class="total-section">
        <p>Total Bayar</p>
        <h3 id="grand-total">Rp 0</h3>
    </div>
    <button class="btn-wa-liquid" onclick="checkoutWA()">
        <span>Pesan Sekarang</span>
        <i class="icon-wa"></i>
    </button>
</div>
