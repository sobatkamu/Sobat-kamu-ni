<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobat Kamu - Order Online</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <h1>SOBAT KAMU</h1>
    <p>Teman Setia Harimu</p>
</header>

<div class="container">
    <h2 class="category-title">🍴 Makanan & Snack</h2>
    <div class="menu-grid">
        <div class="menu-card glass-effect">
            <img src="nasi_babol.jpg" alt="Nasi Chiken BaBol">
            <div class="card-info">
                <div class="menu-name">Nasi Chiken BaBol</div>
                <div class="menu-price">Rp 18.000</div>
                <div class="quantity-control">
                    <button class="btn-minus" onclick="updateCart('Nasi Chiken BaBol', 18000, -1, 'makanan')">-</button>
                    <span class="q-count" id="q-Nasi-Chiken-BaBol">0</span>
                    <button class="btn-plus" onclick="updateCart('Nasi Chiken BaBol', 18000, 1, 'makanan')">+</button>
                </div>
            </div>
        </div>

        <div class="menu-card glass-effect">
            <img src="burger.jpg" alt="Burger Kamu">
            <div class="card-info">
                <div class="menu-name">Burger Kamu</div>
                <div class="menu-price">Rp 20.000</div>
                <div class="quantity-control">
                    <button class="btn-minus" onclick="updateCart('Burger Kamu', 20000, -1, 'makanan')">-</button>
                    <span class="q-count" id="q-Burger-Kamu">0</span>
                    <button class="btn-plus" onclick="updateCart('Burger Kamu', 20000, 1, 'makanan')">+</button>
                </div>
            </div>
        </div>

        <div class="menu-card glass-effect">
            <img src="roti_bakar.jpg" alt="Roti Bakar">
            <div class="card-info">
                <div class="menu-name">Roti Bakar (Multi Topping)</div>
                <div class="menu-price">Rp 10.000</div>
                <div class="quantity-control">
                    <button class="btn-minus" onclick="updateCart('Roti Bakar', 10000, -1, 'makanan')">-</button>
                    <span class="q-count" id="q-Roti-Bakar">0</span>
                    <button class="btn-plus" onclick="updateCart('Roti Bakar', 10000, 1, 'makanan')">+</button>
                </div>
            </div>
        </div>

        <div class="menu-card glass-effect">
            <img src="burger_komplit.jpg" alt="Burger Sobat Komplit">
            <div class="card-info">
                <div class="menu-name">Burger Sobat Komplit</div>
                <div class="menu-price">Rp 35.000</div>
                <div class="quantity-control">
                    <button class="btn-minus" onclick="updateCart('Burger Sobat Komplit', 35000, -1, 'makanan')">-</button>
                    <span class="q-count" id="q-Burger-Sobat-Komplit">0</span>
                    <button class="btn-plus" onclick="updateCart('Burger Sobat Komplit', 35000, 1, 'makanan')">+</button>
                </div>
            </div>
        </div>
        
        </div>

    <h2 class="category-title">🥤 Minuman</h2>
    <div class="menu-grid">
        <div class="menu-card glass-effect">
            <img src="coklat_milk.jpg" alt="Coklat Blend Milk">
            <div class="card-info">
                <div class="menu-name">Coklat Blend Milk</div>
                <div class="menu-price">Rp 12.000</div>
                <div class="quantity-control">
                    <button class="btn-minus" onclick="updateCart('Coklat Blend Milk', 12000, -1, 'minuman')">-</button>
                    <span class="q-count" id="q-Coklat-Blend-Milk">0</span>
                    <button class="btn-plus" onclick="updateCart('Coklat Blend Milk', 12000, 1, 'minuman')">+</button>
                </div>
            </div>
        </div>

        <div class="menu-card glass-effect">
            <img src="vanilla_blend.jpg" alt="Vanilla Blend">
            <div class="card-info">
                <div class="menu-name">Vanilla Blend</div>
                <div class="menu-price">Rp 10.000</div>
                <div class="quantity-control">
                    <button class="btn-minus" onclick="updateCart('Vanilla Blend', 10000, -1, 'minuman')">-</button>
                    <span class="q-count" id="q-Vanilla-Blend">0</span>
                    <button class="btn-plus" onclick="updateCart('Vanilla Blend', 10000, 1, 'minuman')">+</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="checkout-bar-glass">
    <div class="total-info">
        <span class="total-label">Total Pesanan</span>
        <span class="total-price" id="display-total">Rp 0</span>
    </div>
    <button class="btn-wa-glass" onclick="sendWhatsApp()">Kirim Pesanan</button>
</div>

<div class="checkout-bar" id="checkout-bar">
    <div class="checkout-info">
        <div class="total-label">Total Pesanan</div>
        <div class="total-price" id="display-total">Rp 0</div>
    </div>
    <button class="btn-order" onclick="sendWhatsApp()">Pesan via WA</button>
</div>

<script src="script.js"></script>
</body>
</html>
