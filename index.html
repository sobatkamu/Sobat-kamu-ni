<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobat Kamu - Order Online</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <h1>Sobat Kamu</h1>
    <p>Teman Setia Harimu</p>
</header>

<div class="container">
    <h2 class="category-title">Makanan</h2>
    <div class="menu-grid">
        <div class="menu-card">
            <img src="nasi_babol.jpg" alt="Nasi Chiken BaBol">
            <div class="card-info">
                <div class="menu-name">Nasi Chiken BaBol</div>
                <div class="menu-price">Rp 18.000</div>
                <button class="btn-add" onclick="addToCart('Nasi Chiken BaBol', 18000)">Tambah</button>
            </div>
        </div>

        <div class="menu-card">
            <img src="burger.jpg" alt="Burger Kamu">
            <div class="card-info">
                <div class="menu-name">Burger Kamu</div>
                <div class="menu-price">Rp 20.000</div>
                <button class="btn-add" onclick="addToCart('Burger Kamu', 20000)">Tambah</button>
            </div>
        </div>
    </div>

    <h2 class="category-title">Minuman</h2>
    <div class="menu-grid">
        <div class="menu-card">
            <img src="mitcha.jpg" alt="Mitcha Sobat">
            <div class="card-info">
                <div class="menu-name">Mitcha Sobat</div>
                <div class="menu-price">Rp 10.000</div>
                <button class="btn-add" onclick="addToCart('Mitcha Sobat', 10000)">Tambah</button>
            </div>
        </div>
    </div>
</div>

<div class="checkout-bar">
    <div>
        <div class="total-label">Total Pesanan</div>
        <div class="total-price">Rp 0</div>
    </div>
    <a href="#" id="btn-wa" target="_blank" class="btn-whatsapp">
        Pesan Sekarang
    </a>
</div>

<script src="script.js"></script>
</body>
</html>
