<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobat Kamu - Order Online</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <h1>SOBAT KAMU</h1>
    <p>Teman Setia Harimu</p>
</header>

<div class="container">
    <h2 class="category-title">🍴 Makanan & Snack</h2>
    <div class="menu-grid">
        <div class="menu-card">
            <div class="card-info">
                <div class="menu-name">Roti Bakar</div>
                <div class="menu-price">Rp 10.000</div>
                <div class="quantity-control">
                    <button class="btn-circle btn-minus" onclick="updateCart('Roti Bakar', 10000, -1)">-</button>
                    <span class="q-count" id="q-Roti-Bakar">0</span>
                    <button class="btn-circle btn-plus" onclick="updateCart('Roti Bakar', 10000, 1)">+</button>
                </div>
            </div>
        </div>

        <div class="menu-card">
            <div class="card-info">
                <div class="menu-name">Burger Sobat Komplit</div>
                <div class="menu-price">Rp 35.000</div>
                <div class="quantity-control">
                    <button class="btn-circle btn-minus" onclick="updateCart('Burger Sobat Komplit', 35000, -1)">-</button>
                    <span class="q-count" id="q-Burger-Sobat-Komplit">0</span>
                    <button class="btn-circle btn-plus" onclick="updateCart('Burger Sobat Komplit', 35000, 1)">+</button>
                </div>
            </div>
        </div>

        <div class="menu-card">
            <div class="card-info">
                <div class="menu-name">Kentang Goreng</div>
                <div class="menu-price">Rp 15.000</div>
                <div class="quantity-control">
                    <button class="btn-circle btn-minus" onclick="updateCart('Kentang Goreng', 15000, -1)">-</button>
                    <span class="q-count" id="q-Kentang-Goreng">0</span>
                    <button class="btn-circle btn-plus" onclick="updateCart('Kentang Goreng', 15000, 1)">+</button>
                </div>
            </div>
        </div>
        </div>

    <h2 class="category-title">🥤 Minuman Blend</h2>
    <div class="menu-grid">
        <div class="menu-card">
            <div class="card-info">
                <div class="menu-name">Coklat Blend Milk</div>
                <div class="menu-price">Rp 12.000</div>
                <div class="quantity-control">
                    <button class="btn-circle btn-minus" onclick="updateCart('Coklat Blend Milk', 12000, -1)">-</button>
                    <span class="q-count" id="q-Coklat-Blend-Milk">0</span>
                    <button class="btn-circle btn-plus" onclick="updateCart('Coklat Blend Milk', 12000, 1)">+</button>
                </div>
            </div>
        </div>
        </div>
</div>

<div class="checkout-bar" id="checkout-bar">
    <div class="checkout-info">
        <div class="total-label">Total Pesanan</div>
        <div class="total-price" id="display-total">Rp 0</div>
    </div>
    <button class="btn-order" onclick="sendWhatsApp()">Pesan via WA</button>
</div>

<script src="script.js"></script>
</body>
</html>
